<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Plotly.js via CDN -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js" charset="utf-8"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        #plotContainer {
            width: 100%;
            max-width: 900px; /* Adjusted for potentially wider legend */
            height: 700px;   /* Adjusted for better 3D view */
            margin: 20px auto;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="plotContainer"></div>
    
    <script>
        // --- LP Problem Configuration ---
        // Objective: Max Z = 3*x1 + 5*x2
        // Constraints:
        // x1 + 2*x2 <= 8
        // 2*x1 + x2 <= 7
        // x1 >= 0, x2 >= 0
        // Optimal: x1=2, x2=3, Z=21

        // --- Generate Data for the Objective Function Plane ---
        const x1_coords_plane = [];
        const x2_coords_plane = [];
        const z_obj_plane_data = []; 

        const numGridPoints = 50;
        const x1MinPlane = -1, x1MaxPlane = 9; // Range for plotting the full plane
        const x2MinPlane = -1, x2MaxPlane = 8;

        const x1StepPlane = (x1MaxPlane - x1MinPlane) / (numGridPoints - 1);
        const x2StepPlane = (x2MaxPlane - x2MinPlane) / (numGridPoints - 1);

        for (let i = 0; i < numGridPoints; i++) {
            x1_coords_plane.push(x1MinPlane + i * x1StepPlane);
            x2_coords_plane.push(x2MinPlane + i * x2StepPlane);
        }

        let minZOnPlane = Infinity; // For offsetting 2D boundary lines

        for (let i = 0; i < numGridPoints; i++) { // Corresponds to x2
            const current_x2 = x2_coords_plane[i];
            const zRow = [];
            for (let j = 0; j < numGridPoints; j++) { // Corresponds to x1
                const current_x1 = x1_coords_plane[j];
                const z_val = 3 * current_x1 + 5 * current_x2;
                zRow.push(z_val);
                if (z_val < minZOnPlane) {
                    minZOnPlane = z_val;
                }
            }
            z_obj_plane_data.push(zRow);
        }
        const lines_z_offset = minZOnPlane - 3; // Place 2D boundaries below the plane

        // --- Trace for the Objective Function Plane ---
        const objectivePlaneTrace = {
            x: x1_coords_plane,
            y: x2_coords_plane,
            z: z_obj_plane_data,
            type: 'surface',
            colorscale: 'Blues',
            opacity: 0.6,
            showscale: true,
            colorbar: {title: 'Z Value on Plane', titleside: 'right', len: 0.7},
            name: 'Objective Plane: Z = 3x1 + 5x2'
        };

        // --- Feasible Region Polygon on the Objective Plane (mesh3d) ---
        // Vertices of the 2D feasible region: (0,0), (3.5,0), (2,3), (0,4)
        const fr_vertices_x1 = [0, 3.5, 2, 0]; 
        const fr_vertices_x2 = [0, 0, 3, 4]; 
        const fr_vertices_z = fr_vertices_x1.map((x1, idx) => 3 * x1 + 5 * fr_vertices_x2[idx]);
        // Expected fr_vertices_z: [0, 10.5, 21, 20]

        const feasibleRegionMesh = {
            x: fr_vertices_x1,
            y: fr_vertices_x2,
            z: fr_vertices_z,
            i: [0, 0], // Triangle 1: vertices 0,1,2
            j: [1, 2], // Triangle 2: vertices 0,2,3
            k: [2, 3],
            type: 'mesh3d',
            color: 'rgba(0,128,0,0.8)', // Solid green with some opacity
            flatshading: true, // Gives a more solid appearance to the polygon
            name: 'Feasible Region (on Objective Plane)'
        };
        
        // --- Boundary of the 2D Feasible Region (drawn at lines_z_offset) ---
        const fr_boundary_2D_x1 = [0, 3.5, 2, 0, 0]; // Close the polygon
        const fr_boundary_2D_x2 = [0, 0, 3, 4, 0];
        const fr_boundary_2D_z = fr_boundary_2D_x1.map(() => lines_z_offset);

        const feasibleRegionBoundary2D = {
            x: fr_boundary_2D_x1,
            y: fr_boundary_2D_x2,
            z: fr_boundary_2D_z,
            mode: 'lines',
            type: 'scatter3d',
            line: {
                color: 'purple',
                width: 5
            },
            name: 'Feasible Region Boundary (2D Projection)'
        };

        // --- Optimal Point ---
        const optimalPoint = {
            x: [2],
            y: [3],
            z: [21],
            mode: 'markers',
            type: 'scatter3d',
            marker: {
                size: 10, // Larger marker
                color: 'red',
                symbol: 'diamond'
            },
            name: 'Optimal Point (x1=2, x2=3, Z=21)'
        };
        
        // --- Plotly Layout ---
        const layout = {
            title: 'LP Maximization: Z = 3x1 + 5x2',
            scene: {
                xaxis: { title: 'x1 (Product A)', range: [x1MinPlane, x1MaxPlane] },
                yaxis: { title: 'x2 (Product B)', range: [x2MinPlane, x2MaxPlane] },
                zaxis: { title: 'Z (Profit)' },
                camera: {
                    eye: { x: -1.7, y: -2.0, z: 1.0 } // Adjusted for a good initial view
                },
                aspectratio: {x:1, y:1, z:0.7} // Adjust z-axis scaling if needed
            },
            margin: { l: 10, r: 10, b: 10, t: 50 }, // Added some margin
            legend: { x: 0.7, y: 0.95, bgcolor: 'rgba(255,255,255,0.7)'} // Legend with background
        };

        // --- Data Array for Plotly ---
        const plotData = [
            objectivePlaneTrace,
            feasibleRegionMesh,
            feasibleRegionBoundary2D,
            optimalPoint
        ];

        // --- Create the Plot ---
        Plotly.newPlot('plotContainer', plotData, layout);

    </script>
</body></html>
