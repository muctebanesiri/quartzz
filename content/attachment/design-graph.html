<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گراف همبستگی (جاذبه قوی برای همبستگی بالا)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            height: 100vh;
            background-color: #282c34;
            color: #abb2bf;
            overflow: hidden;
        }
        svg {
            border: 1px solid #454c5a;
            background-color: #21252b;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        .node-label {
            font-size: 12px;
            font-weight: bold;
            fill: white;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
            user-select: none;
        }
        .node-circle {
            stroke: #61afef;
            stroke-width: 1.5px;
            cursor: grab;
        }
        .node-circle:active {
            cursor: grabbing;
        }
        .link-line {
            stroke-linecap: round;
        }
    </style>
</head>
<body>
    <svg id="correlationGraph" width="900" height="700"></svg>

    <script>
        const C_detailed = [
            [1.0, -0.8,  0.3, -0.4,  0.7,  0.8],
            [-0.8, 1.0, -0.1, -0.7,  0.1,  0.4],
            [0.3, -0.1,  1.0,  0.6,  0.0,  0.8],
            [-0.4, -0.7,  0.6,  1.0, -0.3,  0.7],
            [0.7,  0.1,  0.0, -0.3,  1.0,  0.5],
            [0.8,  0.4,  0.8,  0.7,  0.5,  1.0]
        ];

        const factorNamesSimple = ["x1", "x2", "x3", "x4", "x5", "x6"];

        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.getElementById('correlationGraph');
        const width = parseInt(svg.getAttribute('width'));
        const height = parseInt(svg.getAttribute('height'));
        const centerX = width / 2;
        const centerY = height / 2;
        const nodeRadius = 25;
        const maxStrokeWidth = 8;

        // --- Simulation Parameters (Adjust these for the new "gravity" logic) ---
        const SIM_PARAMS = {
            CHARGE_STRENGTH: 6000,     // Might need to be higher due to more attraction
            LINK_DISTANCE_BASE: 250,   // Base distance, might need to be larger
            LINK_STRENGTH: 0.1,       // Spring constant
            CENTER_PULL_STRENGTH: 0.01, // Pull to center
            DAMPING: 0.92,
            MIN_ENERGY_THRESHOLD: 0.005
        };

        let nodes = [];
        let links = [];
        let svgElements = { circles: [], texts: [], lines: [] };

        let draggedNode = null;
        let animationFrameId = null;

        factorNamesSimple.forEach((name, i) => {
            const node = {
                id: i, name: name,
                x: centerX + (Math.random() - 0.5) * (width / 4),
                y: centerY + (Math.random() - 0.5) * (height / 4),
                vx: 0, vy: 0, fx: 0, fy: 0, mass: 1
            };
            nodes.push(node);

            const group = document.createElementNS(svgNS, 'g');
            svg.appendChild(group);
            const circle = document.createElementNS(svgNS, 'circle');
            circle.setAttribute('r', nodeRadius);
            circle.setAttribute('fill', `hsl(${(i * 360 / factorNamesSimple.length)}, 70%, 60%)`);
            circle.setAttribute('class', 'node-circle');
            group.appendChild(circle);
            svgElements.circles.push(circle);
            const text = document.createElementNS(svgNS, 'text');
            text.setAttribute('class', 'node-label');
            text.textContent = name;
            group.appendChild(text);
            svgElements.texts.push(text);
            group.onmousedown = (e) => {
                draggedNode = node;
                if (animationFrameId === null) restartAnimation();
                svg.style.cursor = 'grabbing';
            };
        });

        svg.onmousemove = (e) => {
            if (draggedNode) {
                const svgRect = svg.getBoundingClientRect();
                draggedNode.x = e.clientX - svgRect.left;
                draggedNode.y = e.clientY - svgRect.top;
                draggedNode.vx = 0; draggedNode.vy = 0;
            }
        };
        svg.onmouseup = svg.onmouseleave = () => {
            if (draggedNode) {
                draggedNode = null;
                svg.style.cursor = 'default';
            }
        };

        for (let i = 0; i < C_detailed.length; i++) {
            for (let j = i + 1; j < C_detailed[i].length; j++) {
                const correlation = C_detailed[i][j];
                if (Math.abs(correlation) < 0.05) continue;
                links.push({ source: nodes[i], target: nodes[j], correlation: correlation });
                const line = document.createElementNS(svgNS, 'line');
                line.setAttribute('class', 'link-line');
                svg.insertBefore(line, svg.firstChild);
                svgElements.lines.push(line);
            }
        }

        function applyForces() {
            nodes.forEach(node => { node.fx = 0; node.fy = 0; });

            // MODIFIED LINK FORCE LOGIC
            links.forEach(link => {
                const dx = link.target.x - link.source.x;
                const dy = link.target.y - link.source.y;
                const distance = Math.sqrt(dx * dx + dy * dy) || 1e-6;

                const absCorrelation = Math.abs(link.correlation);
                // Ideal distance: Shorter for high absCorrelation
                // The 0.8 factor below controls how much the distance shrinks.
                // e.g., absCorr=1 => idealDistanceFactor = 0.2
                // e.g., absCorr=0.1 => idealDistanceFactor = 0.92
                const idealDistanceFactor = 1 - (absCorrelation * 0.8);
                const idealDistance = SIM_PARAMS.LINK_DISTANCE_BASE * Math.max(0.05, idealDistanceFactor);

                const displacement = distance - idealDistance; // Positive if further than ideal (needs pull)
                // Force is stronger for higher absCorrelation and larger displacement
                const forceMagnitude = SIM_PARAMS.LINK_STRENGTH * absCorrelation * displacement;

                const fx = (dx / distance) * forceMagnitude;
                const fy = (dy / distance) * forceMagnitude;

                link.source.fx += fx;
                link.source.fy += fy;
                link.target.fx -= fx;
                link.target.fy -= fy;
            });

            for (let i = 0; i < nodes.length; i++) {
                const nodeA = nodes[i];
                for (let j = i + 1; j < nodes.length; j++) {
                    const nodeB = nodes[j];
                    const dx = nodeA.x - nodeB.x;
                    const dy = nodeA.y - nodeB.y;
                    let distanceSq = dx * dx + dy * dy;
                    if (distanceSq === 0) { distanceSq = 0.1; nodeA.x += (Math.random() - 0.5) * 0.1;}
                    const distance = Math.sqrt(distanceSq);

                    const repulsiveForce = SIM_PARAMS.CHARGE_STRENGTH / distanceSq;
                    nodeA.fx += (dx / distance) * repulsiveForce;
                    nodeA.fy += (dy / distance) * repulsiveForce;
                    nodeB.fx -= (dx / distance) * repulsiveForce;
                    nodeB.fy -= (dy / distance) * repulsiveForce;

                    const minDist = nodeRadius * 2.2;
                    if (distance < minDist) {
                        const overlap = minDist - distance;
                        const pushForce = overlap * 0.7; // Stronger collision
                        nodeA.fx += (dx / distance) * pushForce;
                        nodeA.fy += (dy / distance) * pushForce;
                        nodeB.fx -= (dx / distance) * pushForce;
                        nodeB.fy -= (dy / distance) * pushForce;
                    }
                }
            }

            nodes.forEach(node => {
                if (draggedNode === node) return;
                node.fx += (centerX - node.x) * SIM_PARAMS.CENTER_PULL_STRENGTH * node.mass;
                node.fy += (centerY - node.y) * SIM_PARAMS.CENTER_PULL_STRENGTH * node.mass;
            });
        }

        function updatePositions() {
            let totalEnergy = 0;
            nodes.forEach(node => {
                if (draggedNode === node) return;
                node.vx = (node.vx + node.fx / node.mass) * SIM_PARAMS.DAMPING;
                node.vy = (node.vy + node.fy / node.mass) * SIM_PARAMS.DAMPING;
                if (Math.abs(node.vx) < 0.01) node.vx = 0;
                if (Math.abs(node.vy) < 0.01) node.vy = 0;
                node.x += node.vx;
                node.y += node.vy;
                const margin = nodeRadius * 1.5;
                if (node.x < margin) { node.x = margin; node.vx *= -0.5; }
                if (node.x > width - margin) { node.x = width - margin; node.vx *= -0.5; }
                if (node.y < margin) { node.y = margin; node.vy *= -0.5; }
                if (node.y > height - margin) { node.y = height - margin; node.vy *= -0.5; }
                totalEnergy += node.vx * node.vx + node.vy * node.vy;
            });
            return totalEnergy;
        }

        function draw() {
            nodes.forEach((node, i) => {
                const group = svgElements.circles[i].parentNode;
                group.setAttribute('transform', `translate(${node.x.toFixed(1)}, ${node.y.toFixed(1)})`);
            });
            svgElements.lines.forEach((lineEl, idx) => {
                const link = links[idx];
                if (!link) return;
                lineEl.setAttribute('x1', link.source.x.toFixed(1));
                lineEl.setAttribute('y1', link.source.y.toFixed(1));
                lineEl.setAttribute('x2', link.target.x.toFixed(1));
                lineEl.setAttribute('y2', link.target.y.toFixed(1));
                const corr = link.correlation;
                const absCorr = Math.abs(corr);
                const strokeW = Math.max(1.5, absCorr * maxStrokeWidth);
                lineEl.setAttribute('stroke-width', strokeW.toString());
                const opacity = 0.4 + absCorr * 0.5; // Opacity based on abs strength
                if (corr > 0) {
                    lineEl.setAttribute('stroke', `rgba(80, 220, 80, ${opacity})`);
                } else {
                    lineEl.setAttribute('stroke', `rgba(255, 80, 80, ${opacity})`);
                }
            });
        }

        let stableCounter = 0;
        function simulationLoop() {
            applyForces();
            const totalKineticEnergy = updatePositions();
            draw();
            if (totalKineticEnergy < SIM_PARAMS.MIN_ENERGY_THRESHOLD && !draggedNode) {
                stableCounter++;
            } else {
                stableCounter = 0;
            }
            if (stableCounter > 150) {
                console.log("Graph stabilized (universal attraction model).");
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            } else {
                animationFrameId = requestAnimationFrame(simulationLoop);
            }
        }
        function restartAnimation(){
            if (animationFrameId !== null) { cancelAnimationFrame(animationFrameId); }
            stableCounter = 0;
            animationFrameId = requestAnimationFrame(simulationLoop);
        }
        restartAnimation();
    </script>
</body>
</html>
